<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuwait Celebration 🇰🇼 | Rawan Ahmad</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Fireworks canvas -->
<canvas id="fireworks"></canvas>

<!-- Animated Gradient Background -->
<div class="background"></div>

<!-- Floating Kuwait Flag -->
<div class="floating-flag">🇰🇼</div>

<!-- Glassmorphism Card -->
<div class="card">
    <h1 class="title">
        Kuwait National & Liberation Day 🇰🇼
    </h1>

    <p class="date">
        February 25th – National Day 🇰🇼<br>
        February 26th – Liberation Day 🇰🇼
    </p>

    <p class="arabic">
        كل عام وكويتنا الحبيبة بألف خير والله يديم علينا نعمة الأمن والأمان 🇰🇼
    </p>

    <button id="celebrateBtn">🎉 Start Celebration</button>

    <p class="creator">✨ Created by <span>Rawan Ahmad</span></p>
</div>

<!-- Celebration Music -->
<audio id="music" loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
